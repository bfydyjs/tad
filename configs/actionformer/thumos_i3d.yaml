dataset:
  _common: &dataset_common
    type: ThumosPaddingDataset
    ann_file: data/thumos-14/annotations/thumos_14_anno.json
    class_map: data/thumos-14/annotations/category_idx.txt
    data_path: data/thumos-14/features/i3d_actionformer_stride4_thumos/
    block_list: data/thumos-14/features/i3d_actionformer_stride4_thumos/missing_files.txt
    feature_stride: 4
    sample_stride: 1
    offset_frames: 8
  train:
    <<: *dataset_common
    subset_name: training
    filter_gt: false
    pipeline:
      - type: LoadFeats
        feat_format: npy
      - type: ConvertToTensor
        keys: [feats, gt_segments_feat, gt_labels]
      - type: RandomTrunc
        trunc_len: 2304
        trunc_thresh: 0.5
        crop_ratio: [0.9, 1.0]
      - type: Rearrange
        keys: [feats]
        ops: t c -> c t
      - type: Collect
        inputs: feats
        keys: [masks, gt_segments_feat, gt_labels]
  val: &dataset_val
    <<: *dataset_common
    subset_name: validation
    filter_gt: false
    test_mode: true
    pipeline:
      - type: LoadFeats
        feat_format: npy
      - type: ConvertToTensor
        keys: [feats]
      - type: Rearrange
        keys: [feats]
        ops: t c -> c t
      - type: Collect
        inputs: feats
        keys: [masks]
  test: *dataset_val

evaluation:
  type: MeanAveragePrecision
  subset: validation
  tiou_thresholds: [0.3, 0.4, 0.5, 0.6, 0.7]
  ground_truth_file: data/thumos-14/annotations/thumos_14_anno.json

model:
  type: ActionFormer
  projection:
    type: Conv1DTransformerProj
    in_channels: 2048
    out_channels: 512
    input_pdrop: 0.2
    arch: [2, 2, 5]
    conv_cfg:
      kernel_size: 3
      proj_pdrop: 0.0
    norm_cfg:
      type: LN
    attn_cfg:
      n_head: 4
      n_mha_win_size: 19
    path_pdrop: 0.1
    use_abs_pe: false
    max_seq_len: 2304
  neck:
    type: FPNIdentity
    in_channels: 512
    out_channels: 512
    num_levels: 6
  rpn_head:
    type: ActionFormerHead
    num_classes: 20
    in_channels: 512
    feat_channels: 512
    num_convs: 2
    cls_prior_prob: 0.01
    prior_generator:
      strides: [1, 2, 4, 8, 16, 32]
      regression_range: [[0, 4], [4, 8], [8, 16], [16, 32], [32, 64], [64, 10000]]
    loss_normalizer: 100
    loss_normalizer_momentum: 0.9
    center_sample: radius
    center_sample_radius: 1.5
    label_smoothing: 0.0
    loss:
      cls_loss:
        type: FocalLoss
      reg_loss:
        type: DIOULoss

inference:
  load_raw_predictions: false
  save_raw_predictions: false
  save_features: false

post_processing:
  nms:
    use_soft_nms: true
    sigma: 0.5
    max_seg_num: 2000
    iou_threshold: 0.1
    min_score: 0.001
    multiclass: true
    voting_thresh: 0.7
  save_dict: false

dataloader:
  train:
    batch_size: 2 # 2>4
    num_workers: 2
  val: &dataloader_val
    batch_size: 1
    num_workers: 1
  test: *dataloader_val
  clip_grad_norm: 1

optimizer:
  lr: 1.0e-4
  weight_decay: 0.05

scheduler:
  warmup_epoch: 5
  max_epoch: 35
  # start_factor: 1.0e-9
  # eta_min : 0

workflow:
  logging_interval: 20
  checkpoint_interval: 1
  val_loss_interval: 1
  val_eval_interval: 1
  val_start_epoch: 30

work_dir: exps/thumos/actionformer_i3d